name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18.x", "20.x", "22.x", "24.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack dry run
        run: npm pack --dry-run

  alpha-integration:
    name: Alpha integration
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      SILMARIL_API_KEY: ${{ secrets.SILMARIL_API_KEY }}
      SILMARIL_API_URL: ${{ secrets.SILMARIL_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify live credentials
        run: |
          test -n "$SILMARIL_API_KEY" || { echo "::error::SILMARIL_API_KEY repo secret is required"; exit 1; }
          test -n "$SILMARIL_API_URL" || { echo "::error::SILMARIL_API_URL repo secret is required"; exit 1; }

      - name: Run alpha integration tests
        run: npm run test:integ
